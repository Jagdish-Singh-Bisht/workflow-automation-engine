<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<body>

<div th:fragment="content">

    <h2>Execution Details</h2>
    <hr>

    <p>
        <strong>Status:</strong>
        <span th:text="${log.status}"></span>
    </p>

    <p>
        <strong>Executed At:</strong>
        <span th:text="${#temporals.format(log.executedAt, 'dd MMM yyyy HH:mm')}"></span>
    </p>

    <p>
        <strong>Input:</strong>
    </p>

    <div class="bg-light border rounded p-3 mb-4">
        <pre class="mb-0"
             th:text="${log.inputData}">
        </pre>
    </div>



    <p>
        <strong>Output:</strong>
    </p>

    <div class="bg-light border rounded p-3">
        <pre class="mb-0"
            th:text="${log.outputData}">
        </pre>
    </div>

    <hr>

    <h4 class="mt-4">Node Execution Flow</h4>

    <table class="table table-bordered mt-3">

        <thead>
        <tr>
            <th>Node Type</th>
            <th>Status</th>
            <th>Output</th>
        </tr>
        </thead>

        <tbody>

        <tr th:each="node : ${nodeLogs}">

            <td th:text="${node.nodeType}"></td>

            <td>

            <span class="badge"
                  th:classappend="${node.status == 'SUCCESS'} ? 'bg-success' : 'bg-danger'"
                  th:text="${node.status}">
            </span>

            </td>

            <td th:text="${node.outputData}"></td>

        </tr>

        </tbody>

    </table>



    <div th:if="${log.status == 'FAILURE'}">
        <button class="btn btn-warning"
                th:onclick="'retryExecution(' + ${log.id} + ', this)'">
            Retry Execution
        </button>
    </div>


</div>

</body>
</html>
