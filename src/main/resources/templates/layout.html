<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automation System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="d-flex">

        <!-- sidebar -->
        <div class="bg-dark text-white p-3" style="width: 250px; height: 100vh;">
            <h4> Automation </h4>
            <hr>

            <ul class = "nav flex-column">
                <li class="na-item">
                    <a class="nav-link text-white" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/workflows">Workflows</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/triggers">Triggers</a>
                </li>
            </ul>
        </div>

        <!-- main content -->
        <div class="p-4 w-100">

            <div th:switch="${page}">

                <div th:case="'dashboard'" th:replace="dashboard :: content"></div>

                <div th:case="'workflows'" th:replace="workflows :: content"></div>

                <div th:case="'triggers'" th:replace="triggers :: content"></div>

                <div th:case="'create-workflow'" th:replace="create-workflow :: content"></div>

                <div th:case="'workflow-nodes'" th:replace="workflow-nodes :: content"></div>

            </div>

        </div>

    </div>

    <div id="resultModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5);">

        <div style="background:#1e1e2f; color:white; width:400px; margin:10% auto; padding:20px; border-radius:10px;">

            <h4>Result</h4>

            <pre id="resultText" style="white-space:pre-wrap;"></pre>

            <button onclick="closeModal()" style="margin-top:10px; padding:5px 10px;">OK</button>

        </div>
    </div>

</body>
</html>
