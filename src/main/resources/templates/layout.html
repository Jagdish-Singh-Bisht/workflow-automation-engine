<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automation System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

    <div class="d-flex">

        <!-- sidebar -->
        <div class="bg-dark text-white p-3" style="width: 250px; height: 100vh;">
            <h4> Automation </h4>
            <hr>

            <ul class = "nav flex-column">
                <li class="na-item">
                    <a class="nav-link text-white" href="/dashboard">Dashboard</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/workflows">Workflows</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link text-white" href="/triggers">Triggers</a>
                </li>
            </ul>
        </div>

        <!-- main content -->
        <div class="p-4 w-100">

            <div th:switch="${page}">

                <div th:case="'dashboard'" th:replace="dashboard :: content"></div>

                <div th:case="'workflows'" th:replace="workflows :: content"></div>

                <div th:case="'triggers'" th:replace="triggers :: content"></div>

            </div>

        </div>

    </div>
</body>
</html>
