<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Automation System</title>

    <!-- Bootstrap CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>

<body>

<div class="d-flex">

    <!-- Sidebar -->
    <div class="bg-dark text-white p-3"
         style="width: 250px; height: 100vh;">

        <h4>Automation</h4>
        <hr>

        <ul class="nav flex-column">

            <li class="nav-item">
                <a class="nav-link text-white"
                   href="/dashboard">
                    Dashboard
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white"
                   href="/workflows">
                    Workflows
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white"
                   href="/triggers">
                    Triggers
                </a>
            </li>

            <li class="nav-item">
                <a class="nav-link text-white"
                   href="/executions">
                    Executions
                </a>
            </li>

        </ul>

    </div>

    <!-- Main Content -->
    <div class="p-4 w-100">

        <th:block th:if="${page == 'dashboard'}">
            <div th:replace="dashboard :: content"></div>
        </th:block>

        <th:block th:if="${page == 'workflows'}">
            <div th:replace="workflows :: content"></div>
        </th:block>

        <th:block th:if="${page == 'triggers'}">
            <div th:replace="triggers :: content"></div>
        </th:block>

        <th:block th:if="${page == 'create-workflow'}">
            <div th:replace="create-workflow :: content"></div>
        </th:block>

        <th:block th:if="${page == 'workflow-details'}">
            <div th:replace="workflow-details :: content"></div>
        </th:block>

        <th:block th:if="${page == 'workflow-nodes'}">
            <div th:replace="workflow-nodes :: content"></div>
        </th:block>

        <th:block th:if="${page == 'executions'}">
            <div th:replace="executions :: content"></div>
        </th:block>

        <th:block th:if="${page == 'execution-details'}">
            <div th:replace="execution-details :: content"></div>
        </th:block>

        <th:block th:if="${page == 'trigger-create'}">
            <div th:replace="trigger-create :: content"></div>
        </th:block>

        <th:block th:if="${page == 'admin-users'}">
            <div th:replace="admin-users :: content"></div>
        </th:block>

    </div>

</div>

<!-- Result Modal -->
<div id="resultModal"
     style="
        display:none;
        position:fixed;
        top:0;
        left:0;
        width:100%;
        height:100%;
        background:rgba(0,0,0,0.5);
     ">

    <div style="
        background:white;
        color:#212529;
        width:500px;
        max-width:90%;
        margin:8% auto;
        padding:25px;
        border-radius:12px;
        box-shadow:0 4px 20px rgba(0,0,0,0.3);
    ">

        <h4 style="margin-bottom:15px;">
            Workflow Result
        </h4>

        <pre id="resultText"
             style="white-space:pre-wrap;">
        </pre>

        <button onclick="closeModal()"
                class="btn btn-primary mt-3">
            OK
        </button>

    </div>

</div>

<script src="/js/workflows.js"></script>

</body>
</html>
