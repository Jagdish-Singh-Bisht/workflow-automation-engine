<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workflow Details</title>
</head>
<body>

<div th:fragment="content">

    <h2 th:text="${workflow.name}"></h2>

    <hr>

    <div class="row">

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Status</h5>

                <span class="badge"
                      th:classappend="${trigger != null and trigger.isActive} ? 'bg-success' : 'bg-secondary'">

                    <span th:text="${trigger != null and trigger.isActive ? 'Active' : 'Inactive'}"></span>

                </span>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Total Executions</h5>

                <p th:text="${totalExecutions}"></p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Last Execution</h5>

                <p th:text="${lastExecution != null ?
                    #temporals.format(lastExecution.executedAt, 'dd MMM yyyy HH:mm')
                    : '--'}">
                </p>
            </div>
        </div>

        <div class="col-md-3">
            <div class="card p-3">
                <h5>Cron</h5>

                <p th:text="${trigger != null ?
                    trigger.cronExpression : '--'}">
                </p>
            </div>
        </div>

    </div>

    <hr>

    <div class="mt-3">

        <a th:href="@{'/workflows/' + ${workflow.id} + '/nodes'}"
           class="btn btn-warning">
            Manage Nodes
        </a>

        <button class="btn btn-success"
                th:onclick="|runWorkflow(${workflow.id}, this)|">
            Run Workflow
        </button>

<!--        <a href="/executions"-->
<!--           class="btn btn-dark">-->
<!--            View Executions-->
<!--        </a>-->

        <a th:href="@{'/workflows/' + ${workflow.id} + '/executions'}"
           class="btn btn-dark">
            View Executions
        </a>

        <hr>

        <h4 class="mt-4">Recent Executions</h4>

        <table class="table table-bordered table-sm mt-3">

            <thead>
            <tr>
                <th>Status</th>
                <th>Executed At</th>
                <th>Output</th>
            </tr>
            </thead>

            <tbody>

            <tr th:each="log : ${recentLogs}">

                <td>
            <span class="badge"
                  th:classappend="${log.status == 'SUCCESS'} ? 'bg-success' : 'bg-danger'"
                  th:text="${log.status}">
            </span>
                </td>

                <td style="white-space: nowrap;"
                    th:text="${#temporals.format(log.executedAt, 'dd MMM yyyy HH:mm')}">
                </td>

                <td th:text="${#strings.abbreviate(log.outputData, 60)}">
                </td>

            </tr>

            </tbody>

        </table>

    </div>

</div>

</body>
</html>
