<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

    <div th:fragment="content">

        <h2>Workflow Nodes</h2>
        <hr>

        <!-- Add node form -->
        <form th:action="@{'/workflows/' + ${workflowId} + '/nodes'}" method="post">

            <div class="mb-3">
                <label>Node Type</label>
                <select name="nodeType" class="form-control">
                    <option value="INPUT">INPUT</option>
                    <option value="PROCESS">PROCESS</option>
                    <option value="OUTPUT">OUTPUT</option>
                </select>
            </div>

            <div class="mb-3">
                <label>Sequence Order</label>
                <input type="number" name="sequenceOrder" class="form-control" required>
            </div>

            <div class="mb-3">
                <label>Config (JSON)</label>
                <textarea name="configJson" class="form-control" placeholder='{"type":"EMAIL"}'></textarea>
            </div>

            <button type="submit" class="btn btn-success">Add Node</button>
        </form>

        <hr>

        <!-- Existing Nodes -->
        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Type</th>
                    <th>Sequence Order</th>
                    <th>Config</th>
                </tr>
            </thead>

            <tbody>
                <tr th:each="node : ${nodes}">
                    <td th:text="${node.nodeType}"></td>
                    <td th:text="${node.sequenceOrder}"></td>
                    <td th:text="${node.configJson}"></td>
                </tr>
            </tbody>
        </table>


        <hr>

        <h3>Trigger Settings</h3>

        <form th:action="@{'/workflows/' + ${workflowId} + '/trigger'}"
              method="post">

            <div class="mb-3">
                <label>Cron Expression</label>

                <input type="text"
                       name="cronExpression"
                       class="form-control"
                       th:value="${trigger != null ? trigger.cronExpression : ''}"
                       placeholder="0 */5 * * * *">
            </div>

            <div class="form-check mb-2">
                <input type="checkbox"
                       name="active"
                       class="form-check-input"
                       th:checked="${trigger != null and trigger.active}">

                <label class="form-check-label">
                    Active Trigger
                </label>
            </div>

            <div class="form-check mb-2">
                <input type="checkbox"
                       name="emailEnabled"
                       class="form-check-input"
                       th:checked="${trigger != null and trigger.emailEnabled}">

                <label class="form-check-label">
                    Email Enabled
                </label>
            </div>

            <div class="form-check mb-3">
                <input type="checkbox"
                       name="whatsappEnabled"
                       class="form-check-input"
                       th:checked="${trigger != null and trigger.whatsappEnabled}">

                <label class="form-check-label">
                    WhatsApp Enabled
                </label>
            </div>

            <button class="btn btn-primary">
                Save Trigger
            </button>

        </form>


    </div>
</body>
</html>
