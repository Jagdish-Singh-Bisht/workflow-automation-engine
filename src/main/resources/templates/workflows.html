<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
</head>
<body>

    <div th:fragment="content">

        <h2>Workflows</h2>

        <button class="btn btn-primary mb-3"> + Create Workflow</button>

        <table class="table table-bordered">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Actions</th>
                </tr>
            </thead>

            <tbody>
            <tr th:each="wf : ${workflows}">
                <td th:text="${wf.name}"></td>
                <td>Active</td>

                <td>
                    <a th:href="@{'/workflows/' + ${wf.id} + '/nodes'}"
                       class="btn btn-sm btn-warning">Manage</a>
                </td>

            </tr>
            </tbody>

        </table>

    </div>

</body>
</html>
