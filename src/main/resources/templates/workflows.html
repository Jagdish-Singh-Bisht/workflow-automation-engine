<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workflows</title>
</head>
<body>

<div th:fragment="content">

    <h2>Workflows</h2>

    <a href="/workflows/create"
       class="btn btn-primary mb-3">
        + Create Workflow
    </a>

    <div style="margin-bottom: 15px;">
        <input type="text" id="workflowInput"
               placeholder="Enter input for workflow"
               style="width: 300px; padding: 5px; border-radius: 5px;" />
    </div>


    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="wf : ${workflows}">
            <td style="cursor: help;"
                th:title="${wf.name == 'EmailFlow' ? 'Converts raw text into formatted email notifications'
              : (wf.name == 'Shipment Report Flow' ? 'Processes shipment workflow and output routing'
              : 'Automated workflow execution')}">

                <span th:text="${wf.name}"></span>

            </td>
            <td>
<!--                <span class="badge bg-success">Active</span>-->
                <span class="badge"
                      th:classappend="${workflowStatusMap[wf.id]} ? 'bg-success' : 'bg-secondary'"
                      th:text="${workflowStatusMap[wf.id]} ? 'Active' : 'Inactive'">
                </span>
            </td>

            <td style="display:flex; align-items:center; gap:10px; flex-wrap:wrap;">
                <!-- Manage Button -->
<!--                <a th:href="@{'/workflows/' + ${wf.id} + '/nodes'}"-->
                <a th:href="@{'/workflows/' + ${wf.id}}"
                   class="btn btn-sm btn-warning">Manage</a>


                <!-- Email toggle -->
                <label class="form-check-label">
                    <input type="checkbox" class="email-toggle" checked>
                    Email
                </label>

                <!-- WhatsApp toggle -->
                <label class="form-check-label">
                    <input type="checkbox" class="wa-toggle">
                    WhatsApp
                </label>

                <!-- Run Button -->
                <button class="btn btn-sm btn-success run-btn"
                        th:onclick="|runWorkflow(${wf.id}, this)|">
                    Run
                </button>
            </td>
        </tr>
        </tbody>
    </table>

</div>
