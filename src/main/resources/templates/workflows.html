<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org" lang="en">
<head>
    <meta charset="UTF-8">
    <title>Workflows</title>
</head>
<body>

<div th:fragment="content">

    <h2>Workflows</h2>

    <button class="btn btn-primary mb-3"> + Create Workflow</button>

    <table class="table table-bordered">
        <thead>
        <tr>
            <th>Name</th>
            <th>Status</th>
            <th>Actions</th>
        </tr>
        </thead>

        <tbody>
        <tr th:each="wf : ${workflows}">
            <td th:text="${wf.name}"></td>
            <td>Active</td>

            <td>
                <!-- Manage Button -->
                <a th:href="@{'/workflows/' + ${wf.id} + '/nodes'}"
                   class="btn btn-sm btn-warning">Manage</a>

                <!-- Run Button -->
                <button class="btn btn-sm btn-success"
                        th:onclick="'runWorkflow(' + ${wf.id} + ')'">
                    Run
                </button>
            </td>
        </tr>
        </tbody>
    </table>

</div>

<!-- 🔥 INLINE JS (WORKING VERSION) -->
<script>
    function runWorkflow(workflowId) {

        console.log("Clicked Run for:", workflowId);

        const input = prompt("Enter input for workflow:");

        if (!input) return;

        fetch('/api/workflows/' + workflowId + '/run?input=' + encodeURIComponent(input), {
            method: 'POST'
        })
        .then(response => response.text())
        .then(data => {
            alert("Result:\\n\\n" + data);
        })
        .catch(error => {
            console.error(error);
            alert("Error running workflow");
        });
    }
</script>

</body>
</html>
